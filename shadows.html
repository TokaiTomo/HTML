<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            text-align: center
        }
        .text{
            text-shadow: 2px 2px 2px blue;
        }
        .box{
            box-shadow: 9px 9px 15px black;
        }
        .indent{
           text-indent: 50%; 
        }
    </style>
</head>
<body>
    <h1 class="text">Text Shadow</h1>
    <h1 class="box">Or use Box shadow</h1>
    <div>
        <p>Text indent</p>
        <p class="indent">Text indent</p>
    </div>
</body>
</html>
