    </tr>
    <tr>
        <td>Bob</td>

        <td>PE⚽️</td>
    </tr>
    <tr>
        <td>John</td>
        <td>7C</td>
        <td>Maths➕</td>
    </tr>
    </Table>
</body>
</html>
