<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Example</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
  </script>
</head>
	
<body>
	<div class="container">
		<h1>Hello Students!</h1>
		<p>Resize the browser window to see the effect.</p>
		<div class="row">
			<!--Size Medium and extra small-->
			<div class="col-md-5 col-1" style="background-color:red; border: 1px solid black;">xs </div>
			<div class="col-md-12 col-md-1" style="background-color:blue;">.col-xs-3 </div>
		</div>
		<div class="row">
			<!--Size Large, medium and extra small-->
			<div class="col-md-12 col-lg-1" style="background-color:green;">.col-xs-6 </div>
			<div class="col-xs-12 col-md-1" style="background-color:yellow;">.col-xs-6 </div>
		</div>
	
		</div>
	</div>
</body>
</html>
