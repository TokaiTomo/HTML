<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting Styles</title>
</head>
<body>
    <p>
        There are many <i>styles</i>. <br>
        I just used <i>italics.</i><br>
        <b>Bold</b> makes it thick. <br>
        <strong>Strong</strong> kind of makes it it thicker than bold.<br>
        <sup>Superscript</sup> goes up and flies.<br>
        <sub>Subscript</sub> goes down.<br>
        <del>Delete</del> makes it look like it is deleted.<br>
        <mark>Marking</mark > highlights it.<br>
        <u>Underline</u> underlines it.<br>
        <small>Small</small> is small. <br>
    </p>
</body>
</html>
