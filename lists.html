<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Different Lists</title>
</head>
<body>
    <H3><u><mark>Ordered</mark> List(Ol)</u></H3>
    <ol>
        <li>Ball</li>
        <li>Keyboard</li>
        <li>Book</li>
        <li>Dog</li>
    </ol>
    <H3><u><mark>Unordered</mark> List(Ul)</u></H3>
    <Ul>
        <li>Ball</li>
        <li>Keyboard</li>
        <li>Book</li>
        <li>Dog</li>
    </Ul>
    <H3><u><mark>Description</mark> List(Dl)</u></H3>
    <Dl>
        <li>Ball</li>
        <li>Keyboard</li>
        <li>Book</li>
        <li>Dog</li>
    </Dl>
</body>
</html>
