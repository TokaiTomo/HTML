<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Card</title>
</head>
<body>
    <fieldset>
        <legend><b>Marks</b></legend>
        <form action="/action_page.php" 
        oninput = "x.value=(parseInt(m1.value)+parseInt(m2.value)+parseInt(m3.value))/3">
            <label for="name">Name</label><br>
            <input type="text" id="Name"><br>
            <label for="marks">Enter Marks</label><br>
            <select name="subject" id="subject">
                <option value="Choose..">Choose..</option>
                <option value="Maths">Maths</option>
                <option value="English">English</option>
                <option value="Humanities">Humanities</option>
                <option value="Science">Science</option>
                <option value="PE">PE</option>
            </select><br>
            <input type="number" id="m1" name="m1"> <br>
            <select name="subject" id="subject">
                <option value="Choose..">Choose..</option>
                <option value="Maths">Maths</option>
                <option value="English">English</option>
                <option value="Humanities">Humanities</option>
                <option value="Science">Science</option>
                <option value="PE">PE</option>
            </select><br>
            <input type="number" id="m2" name="m2"> <br>
            <select name="subject" id="subject">
                <option value="Choose..">Choose..</option>
                <option value="Maths">Maths</option>
                <option value="English">English</option>
                <option value="Humanities">Humanities</option>
                <option value="Science">Science</option>
                <option value="PE">PE</option>
            </select><br>
            <input type="number" id="m3" name="m3"> <br>
            Average: <output name="x" for="m1 m2 m3"></output>
        </form>
    </fieldset>
</body>
</html>
